apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
  namespace: netmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
    spec:
      containers:
        - name: processing-service
          image: ghcr.io/YOUR_ORG/processing-service:latest
          ports:
            - containerPort: 5000
          env:
            - name: KAFKA_BROKERS
              value: kafka-service:9092
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: uri
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
  namespace: netmonitor
spec:
  selector:
    app: processing-service
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
