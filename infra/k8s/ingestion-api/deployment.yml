apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  namespace: netmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
    spec:
      containers:
        - name: ingestion-api
          image: ghcr.io/YOUR_ORG/ingestion-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: KAFKA_BROKERS
              value: kafka-service:9092
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
  namespace: netmonitor
spec:
  selector:
    app: ingestion-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
